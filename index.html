<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wallpaper Hub</title>
    <style>
        /* --- 1. बेसिक और थीम स्टाइल --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f0f15; color: #ffffff; padding-bottom: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #161622; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        header h1 { font-size: 20px; color: #ff3366; letter-spacing: 1px; }
        .menu-container { position: relative; }
        .three-dot-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px 10px; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 40px; background-color: #1e1e2f; border-radius: 8px; min-width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); overflow: hidden; }
        .dropdown-menu button { width: 100%; background: none; border: none; color: white; padding: 12px 15px; text-align: left; font-size: 14px; cursor: pointer; }
        .dropdown-menu button:hover { background-color: #2b2b40; }
        .gallery-container { padding: 20px; }
        .gallery-title { font-size: 18px; margin-bottom: 15px; color: #aaaaaa; }
        .wallpaper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .wallpaper-card { background-color: #161622; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .wallpaper-card:active { transform: scale(0.95); }
        .wallpaper-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .wallpaper-info { padding: 10px; font-size: 12px; text-align: center; color: #ddd; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { background-color: #1e1e2f; padding: 30px 25px; border-radius: 16px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #2b2b40; }
        .auth-box h2 { font-size: 22px; margin-bottom: 10px; color: #ff3366; }
        .auth-box p { font-size: 14px; color: #aaa; margin-bottom: 20px; }
        .auth-box input { width: 100%; padding: 12px; background-color: #11111a; border: 1px solid #3b3b54; border-radius: 8px; color: white; font-size: 16px; margin-bottom: 20px; text-align: center; }
        .auth-box input:focus { outline: none; border-color: #ff3366; }
        .auth-btn { width: 100%; padding: 12px; background: linear-gradient(45deg, #ff3366, #ff6633); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4); }
        .close-btn { background: none; border: none; color: #777; margin-top: 15px; cursor: pointer; font-size: 14px; }
        #chat-dashboard { display: none; max-width: 600px; margin: 0 auto; height: 90vh; flex-direction: column; background-color: #161622; }
        .chat-header { background-color: #1e1e2f; padding: 15px; text-align: center; border-bottom: 1px solid #2b2b40; }
        .chat-header h2 { font-size: 18px; color: #00ffcc; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-color: #0f0f15; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .message.incoming { background-color: #232335; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.outgoing { background: linear-gradient(45deg, #00b4db, #0083b0); align-self: flex-end; border-bottom-right-radius: 2px; }
        .message .username { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #ffcc00; }
        .chat-input-area { padding: 15px; background-color: #1e1e2f; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px; background-color: #11111a; border: 1px solid #3b3b54; border-radius: 8px; color: white; }
        .send-btn { padding: 0 20px; background-color: #00ffcc; border: none; border-radius: 8px; color: #121212; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-website">
        <header>
            <h1>WALLPAPERS</h1>
            <div class="menu-container">
                <button class="three-dot-btn" onclick="toggleDropdown()">⋮</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button onclick="openPasswordModal()">सीक्रेट लॉगिन</button>
                </div>
            </div>
        </header>

        <div class="gallery-container">
            <div class="gallery-title">ट्रेंडिंग वॉलपेपर्स</div>
            <div class="wallpaper-grid">
                <div class="wallpaper-card"><img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=400" alt="Wallpaper"><div class="wallpaper-info">Neon Glow</div></div>
                <div class="wallpaper-card"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400" alt="Wallpaper"><div class="wallpaper-info">Abstract Art</div></div>
                <div class="wallpaper-card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400" alt="Wallpaper"><div class="wallpaper-info">Ocean Wave</div></div>
                <div class="wallpaper-card"><img src="https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=400" alt="Wallpaper"><div class="wallpaper-info">Sunset Peak</div></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="auth-box">
            <h2>सीक्रेट एक्सेस</h2>
            <p>गुप्त कोड दर्ज करें</p>
            <input type="password" id="secretPassword" placeholder="पासवर्ड यहाँ लिखें">
            <button class="auth-btn" onclick="verifyPassword()">वेरीफाई करें</button>
            <br><button class="close-btn" onclick="closeAllModals()">बंद करें</button>
        </div>
    </div>

    <div class="modal-overlay" id="otpModal">
        <div class="auth-box">
            <h2>OTP वेरिफिकेशन</h2>
            <p>कोड दर्ज करें</p>
            <input type="number" id="otpInput" placeholder="4-अंकीय OTP">
            <button class="auth-btn" onclick="verifyOTP()">लॉगिन कम्पलीट करें</button>
            <br><button class="close-btn" onclick="closeAllModals()">बंद करें</button>
        </div>
    </div>

    <div id="chat-dashboard">
        <div class="chat-header"><h2>🔐 मेंबर्स सीक्रेट चैट</h2></div>
        <div class="chat-messages" id="chatMessages">
            <div class="message incoming"><div class="username">असिस्टेंट</div>बधाई हो! आप सीक्रेट डैशबोर्ड में हैं।</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="अपना मैसेज लिखें...">
            <button class="send-btn" onclick="sendMessage()">भेजें</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyOPrvdTFdwz5bFTYBf6KJ5webyBJj_1A",
            authDomain: "himanshuchatapp-785b4.firebaseapp.com",
            projectId: "himanshuchatapp-785b4",
            storageBucket: "himanshuchatapp-785b4.firebasestorage.app",
            messagingSenderId: "817427879739",
            appId: "1:817427879739:web:d39dbf1c89b54400f3c91e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.toggleDropdown = () => { const menu = document.getElementById('dropdownMenu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; };
        window.openPasswordModal = () => { document.getElementById('dropdownMenu').style.display = 'none'; document.getElementById('passwordModal').style.display = 'flex'; };
        window.closeAllModals = () => { document.getElementById('passwordModal').style.display = 'none'; document.getElementById('otpModal').style.display = 'none'; };
        window.verifyPassword = () => { if(document.getElementById('secretPassword').value === "8938") { document.getElementById('passwordModal').style.display = 'none'; document.getElementById('otpModal').style.display = 'flex'; } else { alert("गलत पासवर्ड!"); } };
        window.verifyOTP = () => { if(document.getElementById('otpInput').value === "1234") { closeAllModals(); document.getElementById('main-website').style.display = 'none'; document.getElementById('chat-dashboard').style.display = 'flex'; } else { alert("गलत OTP!"); } };
        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            if(input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), { text: input.value, createdAt: new Date() });
                input.value = "";
            }
        };
    </script>
</body>
</html>
