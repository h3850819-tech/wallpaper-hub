<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wallpaper Hub & Chat</title>
    <style>
        /* --- CSS: वही शानदार डिज़ाइन --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f15; color: #ffffff; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #161622; position: sticky; top: 0; z-index: 100; }
        .menu-container { position: relative; }
        .three-dot-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px 10px; z-index: 1001; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 50px; background-color: #1e1e2f; border-radius: 8px; min-width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; }
        .dropdown-menu button { width: 100%; background: none; border: none; color: white; padding: 12px 15px; text-align: left; cursor: pointer; }
        
        #chat-dashboard { display: none; max-width: 500px; margin: 0 auto; min-height: 100vh; flex-direction: column; background-color: #0f0f15; }
        .user-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1e1e2f; }
        .search-bar { width: 90%; margin: 10px 20px; padding: 12px; border-radius: 12px; background: #1e1e2f; border: 1px solid #3b3b54; color: white; }
        .btn-add { background: #00e6e6; color: #0f0f15; border: none; padding: 7px 18px; border-radius: 20px; cursor: pointer; }
        
        #private-chat-room { display: none; flex-direction: column; height: 100vh; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; }
        .message { padding: 10px; margin: 5px; border-radius: 10px; max-width: 75%; }
        .incoming { background: #1e1e2f; align-self: flex-start; }
        .outgoing { background: #00b3b3; align-self: flex-end; }
        .chat-input-area { padding: 15px; display: flex; gap: 10px; background: #161622; }
    </style>
</head>
<body>

    <div id="main-website">
        <header>
            <h1>🌟 Premium Wallpapers</h1>
            <div class="menu-container">
                <button class="three-dot-btn" onclick="toggleDropdown(event)">⋮</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button onclick="openModal('loginModal')">🔒 प्राइवेट चैट</button>
                    <button onclick="openModal('registerModal')">📝 नया अकाउंट</button>
                </div>
            </div>
        </header>
        <!-- वॉलपेपर ग्रिड और बाकी चीज़ें वही रहेंगी -->
    </div>

    <!-- चैट डैशबोर्ड और बाकी HTML वही है जो हमने पहले बनाया था -->
    <div id="chat-dashboard">
        <!-- [HTML स्ट्रक्चर वही रखें] -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, query, where, getDocs, addDoc, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { /* आपकी कॉन्फ़िग */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- थ्री-डॉट फिक्स ---
        window.toggleDropdown = (event) => { 
            event.stopPropagation();
            const menu = document.getElementById('dropdownMenu'); 
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block'; 
        };
        document.addEventListener('click', () => { document.getElementById('dropdownMenu').style.display = 'none'; });

        // --- 14-दिन वाला और यूज़रनेम फिक्स ---
        document.getElementById('myUsername').addEventListener('change', async (e) => {
            const uid = auth.currentUser.uid;
            const newName = e.target.value.trim().toLowerCase();
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            const data = userSnap.data();

            // 14 दिन चेक
            const lastChange = data.lastUsernameChange ? data.lastUsernameChange.toDate() : 0;
            if (lastChange && (new Date() - lastChange) < (14 * 24 * 60 * 60 * 1000)) {
                alert("आप 14 दिन में केवल एक बार नाम बदल सकते हैं!");
                return;
            }

            await updateDoc(userRef, { username: newName, usernameLower: newName, lastUsernameChange: serverTimestamp() });
            alert("नाम सेव हो गया!");
        });

        // --- सर्च बार फिक्स (केस इन-सेंसिटिव) ---
        document.getElementById('searchUserBar').addEventListener('input', async (e) => {
            const val = e.target.value.toLowerCase();
            if(val.length < 2) return;
            const q = query(collection(db, "users"), where("usernameLower", ">=", val), where("usernameLower", "<=", val + "\uf8ff"));
            const snap = await getDocs(q);
            // यहाँ resultsList में अपडेट करें (जैसा पिछले कोड में था)
        });

        // बाकी सारा Chat, Login और Request लॉजिक वैसा ही है...
    </script>
</body>
</html>
